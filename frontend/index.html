<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GESDOC</title>
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --base:     #1e1e2e;
  --mantle:   #181825;
  --crust:    #11111b;
  --surface0: #313244;
  --surface1: #45475a;
  --surface2: #585b70;
  --overlay0: #6c7086;
  --overlay1: #7f849c;
  --text:     #cdd6f4;
  --subtext0: #a6adc8;
  --subtext1: #bac2de;
  --blue:     #89b4fa;
  --lavender: #b4befe;
  --mauve:    #cba6f7;
  --red:      #f38ba8;
  --green:    #a6e3a1;
  --yellow:   #f9e2af;
  --orange:   #fab387;
  --teal:     #94e2d5;
  --sky:      #89dceb;
  --pink:     #f5c2e7;
  --font: 'Segoe UI', system-ui, sans-serif;
  --font-serif: 'Times New Roman', Times, serif;
  --r4:  4px;
  --r6:  6px;
  --r8:  8px;
  --r12: 12px;
  --shadow-sm: 0 1px 4px rgba(0,0,0,.35);
  --shadow-md: 0 3px 12px rgba(0,0,0,.45);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.55);
  --trans: 160ms ease;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family: var(--font);
  font-size: 10pt;
  background: var(--base);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Scrollbars ── */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--surface1); border-radius:10px; }
::-webkit-scrollbar-thumb:hover { background:var(--surface2); }

/* ── Top bar ── */
#topbar {
  background: linear-gradient(90deg, var(--crust) 0%, #16162a 100%);
  border-bottom: 1px solid var(--surface0);
  box-shadow: var(--shadow-sm);
  padding: 0 14px;
  height: 46px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  z-index: 20;
}
.logo {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14pt;
  font-weight: 700;
  letter-spacing: .5px;
  background: linear-gradient(135deg, var(--blue), var(--mauve));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  user-select: none;
  flex-shrink: 0;
}
.logo i { font-size: 18pt; -webkit-text-fill-color: var(--blue); }

#search-wrap {
  position: relative;
  flex: 1;
  max-width: 380px;
}
#search-wrap i {
  position: absolute;
  left: 9px; top: 50%;
  transform: translateY(-50%);
  color: var(--overlay0);
  font-size: 13pt;
  pointer-events: none;
}
#search-global {
  width: 100%;
  padding: 6px 10px 6px 32px;
  background: var(--surface0);
  border: 1px solid var(--surface1);
  border-radius: 20px;
  color: var(--text);
  font-family: var(--font);
  font-size: 9pt;
  outline: none;
  transition: border-color var(--trans), box-shadow var(--trans);
}
#search-global:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 2px rgba(137,180,250,.15);
}
#search-global::placeholder { color: var(--overlay0); }

.topbar-right { margin-left: auto; display:flex; gap:8px; align-items:center; }
#stats-badge {
  font-size: 8pt;
  color: var(--subtext0);
  background: var(--surface0);
  border: 1px solid var(--surface1);
  padding: 4px 12px;
  border-radius: 20px;
  white-space: nowrap;
}

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: var(--font);
  font-size: 9pt;
  padding: 5px 13px;
  border: none;
  border-radius: var(--r6);
  cursor: pointer;
  transition: all var(--trans);
  white-space: nowrap;
  font-weight: 500;
}
.btn i { font-size: 11pt; line-height:1; }
.btn:active { transform: scale(.97); }
.btn-primary {
  background: linear-gradient(135deg, var(--blue), #6aa0f0);
  color: var(--crust);
  box-shadow: 0 2px 8px rgba(137,180,250,.3);
}
.btn-primary:hover { box-shadow: 0 4px 14px rgba(137,180,250,.4); filter:brightness(1.05); }
.btn-ghost {
  background: var(--surface0);
  color: var(--subtext1);
  border: 1px solid var(--surface1);
}
.btn-ghost:hover { background: var(--surface1); color:var(--text); }
.btn-danger {
  background: rgba(243,139,168,.15);
  color: var(--red);
  border: 1px solid rgba(243,139,168,.3);
}
.btn-danger:hover { background: rgba(243,139,168,.25); }
.btn-sm { padding:3px 9px; font-size:8pt; }
.btn-sm i { font-size:10pt; }
.btn-icon {
  padding: 4px 7px;
  background: transparent;
  color: var(--subtext0);
  border: none;
  cursor: pointer;
  border-radius: var(--r4);
  font-size: 10pt;
  line-height: 1;
  transition: all var(--trans);
}
.btn-icon:hover { background: var(--surface1); color:var(--text); }

/* ── Layout ── */
#layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Sidebar ── */
#sidebar {
  width: 268px;
  min-width: 180px;
  background: linear-gradient(180deg, var(--mantle) 0%, #161622 100%);
  border-right: 1px solid var(--surface0);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}
#sidebar-header {
  padding: 10px 12px 8px;
  border-bottom: 1px solid var(--surface0);
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,.02);
}
#sidebar-header .titulo {
  font-size: 8pt;
  font-weight: 700;
  color: var(--subtext0);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  flex: 1;
}
#sidebar-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 6px 4px;
}

/* Tree items */
.tree-folder {
  border-radius: var(--r6);
  margin: 1px 0;
  overflow: hidden;
}
.tree-folder-header {
  display: flex;
  align-items: center;
  padding: 5px 8px;
  cursor: pointer;
  gap: 5px;
  border-radius: var(--r6);
  transition: background var(--trans);
  user-select: none;
  font-size: 9pt;
}
.tree-folder-header:hover { background: rgba(255,255,255,.05); }
.tree-folder-header.active {
  background: rgba(137,180,250,.12);
  color: var(--blue);
}
.tree-folder-header .chevron {
  font-size: 10pt;
  color: var(--overlay0);
  transition: transform var(--trans);
  flex-shrink: 0;
}
.tree-folder-header .chevron.open { transform: rotate(90deg); }
.tree-folder-header .f-icon {
  font-size: 13pt;
  flex-shrink: 0;
}
.tree-folder-header .f-label {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tree-folder-header .f-count {
  font-size: 7.5pt;
  background: var(--surface1);
  border-radius: 10px;
  padding: 1px 7px;
  color: var(--overlay1);
  flex-shrink: 0;
}
.tree-folder-header .f-actions { display:none; gap:2px; }
.tree-folder-header:hover .f-actions { display:flex; }

.tree-children { padding-left: 16px; }

/* Doc cards */
.doc-card {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: var(--r6);
  margin: 2px 0;
  cursor: pointer;
  transition: all var(--trans);
  user-select: none;
  border: 1px solid transparent;
  position: relative;
}
.doc-card:hover {
  background: rgba(255,255,255,.04);
  border-color: var(--surface1);
}
.doc-card.active {
  background: rgba(137,180,250,.1);
  border-color: rgba(137,180,250,.25);
}
.doc-card .doc-fmt-dot {
  width: 3px;
  border-radius: 3px;
  align-self: stretch;
  flex-shrink: 0;
}
.doc-card .doc-icon { font-size: 14pt; flex-shrink: 0; line-height: 1; }
.doc-card .doc-info { flex: 1; overflow: hidden; min-width: 0; }
.doc-card .doc-name {
  font-size: 8.5pt;
  color: var(--subtext1);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
}
.doc-card .doc-meta { display:flex; align-items:center; gap:5px; margin-top:2px; }
.doc-card .doc-status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.doc-card .doc-fmt-label {
  font-size: 7pt;
  color: var(--overlay0);
  text-transform: uppercase;
  letter-spacing:.5px;
}

/* Separador "sin carpeta" */
.sidebar-section-label {
  font-size: 7.5pt;
  color: var(--overlay0);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 8px 10px 4px;
  font-weight: 600;
}

/* ── Drop zone ── */
#drop-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(137,180,250,.08);
  border: 3px dashed var(--blue);
  z-index: 50;
  pointer-events: none;
  border-radius: 0;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  color: var(--blue);
  font-size: 16pt;
  font-weight: 600;
}
#drop-overlay.visible { display: flex; }
#drop-overlay i { font-size: 48pt; opacity: .8; }

/* ── Toggle panel buttons ── */
.topbar-sep {
  width: 1px;
  height: 20px;
  background: var(--surface1);
  flex-shrink: 0;
}
.toggle-panel-btn {
  color: var(--subtext0);
  padding: 5px 7px;
  border-radius: var(--r6);
  transition: all var(--trans);
}
.toggle-panel-btn.panel-hidden { color: var(--surface2); }
.toggle-panel-btn:hover { color: var(--blue); background: rgba(137,180,250,.1); }

/* ── Paneles colapsables ── */
#sidebar, #comments-panel {
  transition: width 220ms ease, min-width 220ms ease, opacity 200ms ease;
  overflow: hidden;
}
#sidebar.collapsed, #comments-panel.collapsed {
  width: 0 !important;
  min-width: 0 !important;
  opacity: 0;
  border: none;
}
#sidebar.collapsed + .resizer,
.resizer:has(+ #comments-panel.collapsed) { display: none; }

/* ── Pantalla completa ── */
#viewer-panel.fullscreen {
  position: fixed;
  inset: 0;
  z-index: 80;
  background: var(--base);
}
#viewer-panel.fullscreen #viewer-header {
  padding: 8px 16px;
}
.btn-fullscreen-exit { display: none; }
#viewer-panel.fullscreen .btn-fullscreen-exit { display: inline-flex; }
#viewer-panel.fullscreen .btn-fullscreen-enter { display: none; }

/* ── Resizer ── */
.resizer {
  width: 4px;
  background: transparent;
  cursor: col-resize;
  flex-shrink: 0;
  transition: background 200ms;
  position: relative;
}
.resizer::after {
  content: '';
  position: absolute;
  inset: 0 -2px;
}
.resizer:hover, .resizer.dragging { background: var(--blue); }

/* ── Viewer panel ── */
#viewer-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--base);
}
#viewer-header {
  background: linear-gradient(90deg, var(--mantle), #1c1c30);
  border-bottom: 1px solid var(--surface0);
  padding: 0 14px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 56px;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
}
#viewer-header.hidden { display: none; }
.viewer-top-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
#viewer-title {
  font-size: 11pt;
  font-weight: 600;
  color: var(--text);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#viewer-toolbar { display:flex; gap:4px; flex-shrink:0; }

/* Breadcrumbs */
#breadcrumbs {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 4px;
  flex-wrap: wrap;
}
.bc-item {
  display: flex;
  align-items: center;
  gap: 3px;
  font-size: 8pt;
  color: var(--subtext0);
  cursor: pointer;
  border-radius: var(--r4);
  padding: 1px 5px;
  transition: all var(--trans);
}
.bc-item:hover { color: var(--blue); background: rgba(137,180,250,.1); }
.bc-item i { font-size: 9pt; }
.bc-sep { color: var(--overlay0); font-size: 8pt; }
.bc-current { color: var(--text); font-weight: 500; cursor: default; }
.bc-current:hover { background:transparent; color:var(--text); }

/* Status + tag chips */
.chip {
  display: inline-flex; align-items:center; gap:3px;
  font-size: 7.5pt;
  border-radius: 20px;
  padding: 2px 9px;
  font-weight: 500;
  white-space: nowrap;
}
.chip-status-pr  { background: rgba(88,91,112,.3);  color:var(--subtext0); border:1px solid var(--surface1); }
.chip-status-ep  { background: rgba(180,190,254,.1); color:var(--lavender); border:1px solid rgba(180,190,254,.3); }
.chip-status-rev { background: rgba(166,227,161,.1); color:var(--green);    border:1px solid rgba(166,227,161,.3); }
.chip-status-ap  { background: rgba(148,226,213,.1); color:var(--teal);     border:1px solid rgba(148,226,213,.3); }
.chip-tag { background:rgba(203,166,247,.1); color:var(--mauve); border:1px solid rgba(203,166,247,.25); }

/* Viewer body */
#viewer-body {
  flex: 1;
  overflow: hidden;
  position: relative;
}
#viewer-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 14px;
  color: var(--overlay0);
}
#viewer-placeholder i { font-size: 52pt; color:var(--surface1); }
#viewer-placeholder p { font-size: 11pt; }
#viewer-placeholder small { font-size: 8.5pt; color:var(--surface2); }

#pdf-container {
  display: none;
  width: 100%;
  height: 100%;
  overflow-y: auto;
  background: #141420;
  padding: 16px 24px;
}
#pdf-container canvas {
  display: block;
  margin: 0 auto 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,.6);
  border-radius: 3px;
  max-width: 100%;
}
#html-content {
  display: none;
  width: 100%;
  height: 100%;
  overflow: hidden;
}
#html-content iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* ── Comments panel ── */
#comments-panel {
  width: 320px;
  min-width: 250px;
  background: linear-gradient(180deg, var(--mantle) 0%, #161622 100%);
  border-left: 1px solid var(--surface0);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}
#comments-header {
  padding: 10px 12px 8px;
  border-bottom: 1px solid var(--surface0);
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,.02);
}
#comments-header .titulo {
  font-size: 8pt;
  font-weight: 700;
  color: var(--subtext0);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  flex: 1;
}
#comment-count {
  font-size: 7.5pt;
  background: rgba(137,180,250,.15);
  color: var(--blue);
  border: 1px solid rgba(137,180,250,.25);
  border-radius: 20px;
  padding: 1px 8px;
  font-weight: 600;
}

#comments-filters {
  padding: 6px 8px;
  border-bottom: 1px solid var(--surface0);
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  background: rgba(0,0,0,.1);
}
#comments-filters select,
#comments-filters input {
  font-family: var(--font);
  font-size: 8pt;
  background: var(--surface0);
  border: 1px solid var(--surface1);
  color: var(--text);
  border-radius: var(--r4);
  padding: 3px 7px;
  outline: none;
  transition: border-color var(--trans);
}
#comments-filters select:focus,
#comments-filters input:focus { border-color: var(--blue); }
#comments-filters input { flex:1; min-width:80px; }

#comments-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px;
}
.comments-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  gap: 8px;
  color: var(--overlay0);
}
.comments-empty i { font-size: 28pt; color:var(--surface1); }

/* Comment cards */
.comment-card {
  background: var(--surface0);
  border-radius: var(--r8);
  padding: 9px 10px;
  margin-bottom: 6px;
  border: 1px solid transparent;
  border-left: 3px solid var(--surface1);
  transition: all var(--trans);
  font-size: 8.5pt;
}
.comment-card:hover {
  border-color: var(--surface1);
  border-left-color: inherit;
  box-shadow: var(--shadow-sm);
}
.comment-card.prio-alta  { border-left-color: var(--red); }
.comment-card.prio-media { border-left-color: var(--yellow); }
.comment-card.prio-baja  { border-left-color: var(--green); }
.comment-card.reply {
  margin-left: 14px;
  border-left-color: var(--overlay0);
  background: rgba(255,255,255,.02);
  font-size: 8pt;
  position: relative;
}
.comment-card.reply::before {
  content: '';
  position: absolute;
  left: -14px; top: 0; bottom: 0;
  width: 1px;
  background: var(--surface1);
}

.comment-meta {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 5px;
  flex-wrap: wrap;
}
.c-cat {
  display: inline-flex; align-items:center; gap:3px;
  font-size: 7pt;
  background: var(--surface1);
  border-radius: 4px;
  padding: 2px 6px;
  color: var(--subtext0);
  font-weight: 500;
}
.c-author { font-size: 8pt; color: var(--blue); font-weight: 600; }
.c-status {
  font-size: 7pt;
  border-radius: 4px;
  padding: 2px 6px;
  font-weight: 600;
}
.c-status.abierto   { background:rgba(137,180,250,.15); color:var(--blue); }
.c-status.resuelto  { background:rgba(166,227,161,.15); color:var(--green); }
.c-status.pendiente { background:rgba(250,179,135,.15); color:var(--orange); }
.c-date { font-size: 7.5pt; color:var(--overlay0); margin-left:auto; }
.c-prio {
  font-size: 7pt;
  border-radius: 4px;
  padding: 2px 6px;
  font-weight: 600;
}
.c-prio.alta   { background:rgba(243,139,168,.15); color:var(--red); }
.c-prio.media  { background:rgba(249,226,175,.15); color:var(--yellow); }
.c-prio.baja   { background:rgba(166,227,161,.15); color:var(--green); }

.c-highlighted {
  background: rgba(203,166,247,.08);
  border-left: 2px solid var(--mauve);
  padding: 3px 8px;
  font-size: 8pt;
  color: var(--subtext1);
  font-style: italic;
  margin-bottom: 5px;
  border-radius: 0 var(--r4) var(--r4) 0;
}
.c-location {
  display: flex; align-items:center; gap:4px;
  font-size: 7.5pt;
  color: var(--teal);
  margin-bottom: 4px;
}
.c-content { line-height: 1.6; color: var(--text); }
.c-content mark {
  background: rgba(249,226,175,.35);
  color: var(--yellow);
  border-radius: 2px;
  padding: 0 2px;
}
.comment-actions {
  display: flex;
  gap: 4px;
  margin-top: 7px;
  border-top: 1px solid rgba(255,255,255,.04);
  padding-top: 5px;
}

/* Comment form */
#comments-form {
  padding: 8px;
  border-top: 1px solid var(--surface0);
  background: rgba(0,0,0,.2);
  display: flex;
  flex-direction: column;
  gap: 5px;
}
#reply-banner {
  display: none;
  align-items: center;
  gap: 6px;
  background: rgba(137,180,250,.1);
  border: 1px solid rgba(137,180,250,.2);
  border-radius: var(--r4);
  padding: 4px 8px;
  font-size: 8pt;
  color: var(--blue);
}
#reply-banner i { font-size: 10pt; }
#reply-banner button { margin-left:auto; }
.form-row { display:flex; gap:5px; }
#comments-form select,
#comments-form input,
#comments-form textarea {
  font-family: var(--font);
  font-size: 8pt;
  background: var(--surface0);
  border: 1px solid var(--surface1);
  color: var(--text);
  border-radius: var(--r4);
  padding: 4px 7px;
  outline: none;
  width: 100%;
  transition: border-color var(--trans);
}
#comments-form select:focus,
#comments-form input:focus,
#comments-form textarea:focus { border-color:var(--blue); }
#comments-form textarea { resize:vertical; min-height:58px; max-height:120px; }

/* ── Search results dropdown ── */
#search-results {
  position: absolute;
  top: 46px;
  left: 50%;
  transform: translateX(-50%);
  width: 480px;
  background: var(--mantle);
  border: 1px solid var(--surface1);
  border-radius: 0 0 var(--r8) var(--r8);
  box-shadow: var(--shadow-lg);
  max-height: 55vh;
  overflow-y: auto;
  z-index: 60;
  display: none;
}
#search-results.visible { display: block; }

function getUsuario(){ return JSON.parse(localStorage.getItem('gesdoc_user') || 'null'); }

function guardarSesion(token, user) {
  localStorage.setItem('gesdoc_token', token);
  localStorage.setItem('gesdoc_user', JSON.stringify(user));
  estado.usuarioActual = user;
}

function limpiarEstadoApp() {
  // Resetear todo el estado para que el próximo usuario empiece limpio
  estado.docActual       = null;
  estado.carpetaActiva   = null;
  estado.respondiendo    = null;
  estado.terminoBusqueda = '';
  estado.biblioteca      = 'general';
  // Limpiar visor
  document.getElementById('viewer-header')?.classList.add('hidden');
  document.getElementById('pdf-container').style.display   = 'none';
  document.getElementById('html-content').style.display    = 'none';
  document.getElementById('viewer-placeholder').style.display = 'flex';
  document.getElementById('pdf-container').innerHTML       = '';
  // Limpiar comentarios
  document.getElementById('comments-form').style.display   = 'none';
  document.getElementById('comments-list').innerHTML =
    `<div class="comments-empty"><i class='bx bx-message-square-x'></i><span>Abre un documento para ver sus comentarios</span></div>`;
  document.getElementById('comment-count').textContent = '0';
  // Limpiar sidebar
  document.getElementById('sidebar-scroll').innerHTML = '';
  // Limpiar tabs de norma si existen
  const normaPanel = document.getElementById('norma-panel');
  if (normaPanel) normaPanel.remove();
  // Resetear indicador de página PDF
  _actualizarIndicador(0, 0);
  if (_pdfPageObserver) { _pdfPageObserver.disconnect(); _pdfPageObserver = null; }
  _pdfPageEls = [];
  // Resetear tab activo de biblioteca
  document.querySelectorAll('.biblioteca-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-general')?.classList.add('active');
  // Limpiar banner de vigencia
  document.getElementById('vigencia-banner')?.remove();
  // Cerrar modales
  cerrarModal();
}

function cerrarSesion() {
  limpiarEstadoApp();
  localStorage.removeItem('gesdoc_token');
  localStorage.removeItem('gesdoc_user');
  estado.usuarioActual = null;
  mostrarLogin();
}

function mostrarLogin() {
  document.getElementById('login-overlay').classList.remove('oculto');
  document.getElementById('login-pass').value = '';
  document.getElementById('login-error').classList.remove('visible');
}

function ocultarLogin() {
  document.getElementById('login-overlay').classList.add('oculto');
}

async function hacerLogin() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  if (!username || !password) return;
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    if (!res.ok) throw new Error('Credenciales incorrectas');
    const data = await res.json();
    guardarSesion(data.token, data.user);
    ocultarLogin();
    await iniciarApp();
  } catch {
    document.getElementById('login-error').classList.add('visible');
  }
}

// Enter en el formulario de login
document.getElementById('login-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') hacerLogin();
});
document.getElementById('login-user').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-pass').focus();
});

// ─── API helper (con token JWT) ───────────────────────────────────────────────
async function api(method, path, body = null, isForm = false) {
  const opts = { method, headers: {} };
  const token = getToken();
  if (token) opts.headers['Authorization'] = `Bearer ${token}`;
  if (body && !isForm) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  } else if (body && isForm) {
    opts.body = body;
  }
  const res = await fetch('/api' + path, opts);
  if (res.status === 401) { cerrarSesion(); return null; }
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || 'Error de servidor');
  }
  if (res.status === 204) return null;
  return res.json();
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function toast(msg, tipo = 'info') {
  const iconos = { ok:'bx-check-circle', error:'bx-error-circle', info:'bx-info-circle' };
  const el = document.createElement('div');
  el.className = 'toast ' + tipo;
  el.innerHTML = `<i class='bx ${iconos[tipo] || iconos.info}'></i><span>${escapeHtml(msg)}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ─── Sidebar: árbol de carpetas ───────────────────────────────────────────────
async function cargarArbol() {
  const bib  = estado.biblioteca;
  const user = estado.usuarioActual;
  try {
    // Admin en modo personal → árbol de carpetas + docs sin carpeta agrupados por usuario
    if (bib === 'personal' && user?.role === 'admin') {
      const [arbol, todos, sinCarpeta, grupos] = await Promise.all([
        api('GET', `/folders/tree?biblioteca=${bib}`),
        api('GET', `/documents/?biblioteca=${bib}`),
        api('GET', `/documents/?sin_carpeta=true&biblioteca=${bib}`),
        api('GET', '/documents/personal-por-usuario'),
      ]);
      estado.arbolCarpetas = arbol;
      renderSidebarPersonalAdmin(arbol, todos, sinCarpeta, grupos);
      return;
    }
    const [arbol, todos, sinCarpeta] = await Promise.all([
      api('GET', `/folders/tree?biblioteca=${bib}`),
      api('GET', `/documents/?biblioteca=${bib}`),
      api('GET', `/documents/?sin_carpeta=true&biblioteca=${bib}`),
    ]);
    estado.arbolCarpetas = arbol;
    renderSidebar(arbol, todos, sinCarpeta);
  } catch (e) {
    toast('Error cargando biblioteca: ' + e.message, 'error');
  }
}

function renderSidebarPersonalAdmin(arbol, todos, sinCarpeta, grupos) {
  const scroll = document.getElementById('sidebar-scroll');
  scroll.innerHTML = '';

  // Botón para crear carpeta personal desde el sidebar
  const btnCarpeta = document.createElement('div');
  btnCarpeta.style.cssText = 'padding:4px 8px;';
  btnCarpeta.innerHTML = `
    <button class="btn btn-ghost btn-sm" style="width:100%;justify-content:flex-start;"
            onclick="abrirModalCarpeta(null)">
      <i class='bx bx-folder-plus'></i> Nueva carpeta personal
    </button>`;
  scroll.appendChild(btnCarpeta);

  // Todos los documentos
  scroll.appendChild(crearItemTodos(todos.length));

  if (!todos.length && !arbol.length) {
    const empty = document.createElement('div');
    empty.style.cssText = 'text-align:center;padding:1rem;color:var(--overlay0);font-size:8.5pt;';
    empty.textContent = 'Sin documentos personales';
    scroll.appendChild(empty);
    return;
  }

  const sinCarpetaIds = new Set(sinCarpeta.map(d => d.id));

  // Agrupar top-level folders por owner_id
  const carpetasPorOwner = {};
  const carpetasSinOwner = [];
  for (const c of arbol) {
    if (c.owner_id != null) {
      (carpetasPorOwner[c.owner_id] = carpetasPorOwner[c.owner_id] || []).push(c);
    } else {
      carpetasSinOwner.push(c);
    }
  }

  // Renderizar sección por usuario
  const ownerIdsVistos = new Set();
  for (const grupo of grupos) {
    const oid = grupo.documentos[0]?.owner_id;
    const carpetasGrupo = (oid != null ? carpetasPorOwner[oid] : null) || [];
    const docsGrupoSinCarpeta = grupo.documentos.filter(d => sinCarpetaIds.has(d.id));
    if (oid != null) ownerIdsVistos.add(oid);

    if (!carpetasGrupo.length && !docsGrupoSinCarpeta.length) continue;

    // Cabecera de usuario
    const hdr = document.createElement('div');
    hdr.style.cssText = 'padding:6px 10px 3px;font-size:7.5pt;font-weight:700;color:var(--blue);' +
      'text-transform:uppercase;letter-spacing:.8px;border-top:1px solid var(--surface0);' +
      'margin-top:4px;display:flex;align-items:center;gap:6px;';
    hdr.innerHTML = `<i class='bx bx-user' style="font-size:10pt;"></i>${escapeHtml(grupo.usuario)}`;
    scroll.appendChild(hdr);

    // Carpetas del usuario
    for (const c of carpetasGrupo) scroll.appendChild(crearNodoCarpeta(c));

    // Docs sin carpeta del usuario
    for (const doc of docsGrupoSinCarpeta) scroll.appendChild(crearTarjetaDoc(doc));
  }

  // Carpetas de owners sin documentos (edge case: solo tienen carpetas, sin docs)
  for (const [oidStr, folders] of Object.entries(carpetasPorOwner)) {
    const oid = Number(oidStr);
    if (ownerIdsVistos.has(oid)) continue;
    const hdr = document.createElement('div');
    hdr.style.cssText = 'padding:6px 10px 3px;font-size:7.5pt;font-weight:700;color:var(--blue);' +
      'text-transform:uppercase;letter-spacing:.8px;border-top:1px solid var(--surface0);' +
      'margin-top:4px;display:flex;align-items:center;gap:6px;';
    hdr.innerHTML = `<i class='bx bx-user' style="font-size:10pt;"></i>Usuario #${oid}`;
    scroll.appendChild(hdr);
    for (const c of folders) scroll.appendChild(crearNodoCarpeta(c));
  }

  // Carpetas sin owner_id (creadas antes de la migración)
  for (const c of carpetasSinOwner) scroll.appendChild(crearNodoCarpeta(c));
}

function renderSidebar(arbol, todos, sinCarpeta) {
  const scroll = document.getElementById('sidebar-scroll');
  scroll.innerHTML = '';

  // En modo personal: botón visible de "nueva carpeta personal"
  if (estado.biblioteca === 'personal') {
    const btnWrap = document.createElement('div');
    btnWrap.style.cssText = 'padding:4px 8px;';
    btnWrap.innerHTML = `
      <button class="btn btn-ghost btn-sm" style="width:100%;justify-content:flex-start;"
              onclick="abrirModalCarpeta(null)">
        <i class='bx bx-folder-plus'></i> Nueva carpeta personal
      </button>`;
    scroll.appendChild(btnWrap);
  }

  // Todos los documentos
  scroll.appendChild(crearItemTodos(todos.length));

  // Árbol de carpetas
  for (const c of arbol) {
    scroll.appendChild(crearNodoCarpeta(c));
  }

  // Sin carpeta
  if (sinCarpeta.length > 0) {
    const sep = document.createElement('div');
    sep.className = 'sidebar-section-label';
    sep.textContent = 'Sin carpeta';
    scroll.appendChild(sep);
    for (const doc of sinCarpeta) {
      scroll.appendChild(crearTarjetaDoc(doc));
    }
  }
}

function crearItemTodos(count) {
  const div = document.createElement('div');
  div.className = 'tree-folder-header' + (estado.carpetaActiva === null ? ' active' : '');
  div.innerHTML = `
    <i class='bx bx-grid-alt chevron' style="font-size:13pt;color:${estado.carpetaActiva===null?'var(--blue)':'var(--subtext0)'};margin-right:2px;"></i>
    <span class="f-label">Todos los documentos</span>
    <span class="f-count">${count}</span>
  `;
  div.onclick = () => seleccionarCarpeta(null, div);
  return div;
}

function crearNodoCarpeta(carpeta) {
  const wrapper = document.createElement('div');
  wrapper.className = 'tree-folder';

  const header = document.createElement('div');
  header.className = 'tree-folder-header' + (estado.carpetaActiva === carpeta.id ? ' active' : '');
  header.dataset.folderId = carpeta.id;

  const tieneHijos = carpeta.children?.length > 0;
  header.innerHTML = `
    <i class='bx bx-chevron-right chevron ${tieneHijos ? '' : ''}'
       style="visibility:${tieneHijos?'visible':'hidden'}"></i>
    <i class='bx bxs-folder f-icon' style="color:${carpeta.color || 'var(--blue)'};"></i>
    <span class="f-label">${escapeHtml(carpeta.name)}</span>
    <span class="f-actions">
      <button class="btn-icon btn-sm" title="Subir archivo en esta carpeta"
              style="color:var(--blue);"
              onclick="event.stopPropagation();abrirSubirEnCarpeta(${carpeta.id},'${escapeHtml(carpeta.name)}','${carpeta.biblioteca||'general'}')">
        <i class='bx bx-upload'></i>
      </button>
      <button class="btn-icon btn-sm" title="Nueva subcarpeta" onclick="event.stopPropagation();abrirModalCarpeta(null,${carpeta.id})"><i class='bx bx-folder-plus'></i></button>
      <button class="btn-icon btn-sm" title="Editar" onclick="event.stopPropagation();abrirModalCarpeta(${carpeta.id})"><i class='bx bx-edit'></i></button>
      <button class="btn-icon btn-sm" title="Eliminar" onclick="event.stopPropagation();eliminarCarpeta(${carpeta.id})"><i class='bx bx-trash'></i></button>
    </span>
  `;

  let expandido = false;
  const childWrap = document.createElement('div');
  childWrap.className = 'tree-children';
  childWrap.style.display = 'none';

  // Docs zone dentro de esta carpeta (carga lazy al expandir)
  const docsZone = document.createElement('div');
  docsZone.dataset.folderDocsId = carpeta.id;

  if (tieneHijos) {
    for (const hijo of carpeta.children) {
      childWrap.appendChild(crearNodoCarpeta(hijo));
    }
  }
  childWrap.appendChild(docsZone);

  const chevronEl = header.querySelector('.chevron');
  header.onclick = async (e) => {
    if (e.target.closest('.f-actions')) return;
    expandido = !expandido;
    childWrap.style.display = expandido ? 'block' : 'none';
    chevronEl.classList.toggle('open', expandido);
    if (expandido && !docsZone.dataset.loaded) {
      docsZone.dataset.loaded = '1';
      const docs = await api('GET', `/documents/?folder_id=${carpeta.id}&biblioteca=${estado.biblioteca}`).catch(() => []);
      for (const doc of docs) docsZone.appendChild(crearTarjetaDoc(doc));
    }
    seleccionarCarpeta(carpeta.id, header);
  };

  wrapper.appendChild(header);
  wrapper.appendChild(childWrap);
  return wrapper;
}

async function seleccionarCarpeta(id, headerEl) {
  estado.carpetaActiva = id;
  document.querySelectorAll('.tree-folder-header').forEach(el => el.classList.remove('active'));
  if (headerEl) headerEl.classList.add('active');
}

function crearTarjetaDoc(doc) {
  const fmtColores = { pdf:'var(--red)', docx:'var(--blue)', doc:'var(--blue)', md:'var(--green)', markdown:'var(--green)', txt:'var(--subtext0)' };
  const fmtIconos  = { pdf:'bxs-file-pdf', docx:'bxs-file-doc', doc:'bxs-file-doc', md:'bx-code-alt', markdown:'bx-code-alt', txt:'bx-file-blank' };
  const statusColores = { 'Por revisar':'var(--subtext0)', 'En progreso':'var(--lavender)', 'Revisado':'var(--green)', 'Aprobado':'var(--teal)' };

  const fmt    = doc.format?.toLowerCase() || 'txt';
  const color  = fmtColores[fmt]  || 'var(--subtext0)';
  const icono  = fmtIconos[fmt]   || 'bx-file-blank';
  const dotClr = statusColores[doc.status] || 'var(--subtext0)';

  const card = document.createElement('div');
  card.className = 'doc-card' + (estado.docActual?.id === doc.id ? ' active' : '');
  card.dataset.docId = doc.id;
  card.innerHTML = `
    <div class="doc-fmt-dot" style="background:${color};"></div>
    <i class='bx ${icono} doc-icon' style="color:${color};"></i>
    <div class="doc-info">
      <div class="doc-name">${escapeHtml(doc.name)}</div>
      <div class="doc-meta">
        <div class="doc-status-dot" style="background:${dotClr};"></div>
        <span class="doc-fmt-label">${fmt}</span>
      </div>
    </div>
  `;
  card.onclick = () => abrirDocumento(doc.id);
  return card;
}

// ─── Visor ────────────────────────────────────────────────────────────────────
async function abrirDocumento(docId, terminoResaltado = '') {
  try {
    const doc = await api('GET', `/documents/${docId}`);
    estado.docActual = doc;
    if (terminoResaltado) estado.terminoBusqueda = terminoResaltado;

    document.querySelectorAll('.doc-card').forEach(el => {
      el.classList.toggle('active', Number(el.dataset.docId) === docId);
    });

    await renderVisorHeader(doc);
    renderVisor(doc);
    renderTabs();
    renderBannerVigencia(doc);
    if (_pestañaActiva === 'norma') renderNormaPanel(doc);
    mostrarFormComentario();
    await cargarComentarios();
    await cargarStats();
  } catch (e) {
    toast('Error abriendo documento: ' + e.message, 'error');
  }
}

async function renderVisor(doc) {
  const ph  = document.getElementById('viewer-placeholder');
  const pdf = document.getElementById('pdf-container');
  const htm = document.getElementById('html-content');
  ph.style.display = 'none';

  if (doc.format === 'pdf') {
    htm.style.display = 'none';
    pdf.style.display = 'block';
    renderPDF(`/api/documents/${doc.id}/file`, pdf);
  } else {
    // Ocultar indicador de página para no-PDFs
    const ind = document.getElementById('page-indicator');
    if (ind) ind.classList.remove('visible');
    pdf.style.display = 'none';
    htm.style.display = 'block';
    htm.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--subtext0);">Cargando…</div>';
    fetch(`/api/documents/${doc.id}/content`)
      .then(r => r.text())
      .then(html => {
        if (estado.terminoBusqueda) {
          html = resaltarEnHTML(html, estado.terminoBusqueda);
        }
        const fr = document.createElement('iframe');
        fr.style.cssText = 'width:100%;height:100%;border:none;';
        fr.srcdoc = html;
        htm.innerHTML = '';
        htm.appendChild(fr);
      })
      .catch(() => {
        htm.innerHTML = '<div style="padding:2rem;color:var(--red);text-align:center;">Error cargando contenido</div>';
      });
  }
}

// ── Control de página actual ──────────────────────────────────────────────────
let _paginaActual = 1;
let _totalPaginas = 0;
let _pdfPageObserver = null;
let _pdfPageEls = [];

function _actualizarIndicador(pag, total) {
  _paginaActual = pag;
  _totalPaginas = total;
  const ind = document.getElementById('page-indicator');
  if (!ind) return;
  ind.classList.toggle('visible', total > 0);
  document.getElementById('pi-current').textContent = pag;
  document.getElementById('pi-total').textContent   = total;
  if (document.getElementById('pi-prev')) document.getElementById('pi-prev').disabled = pag <= 1;
  if (document.getElementById('pi-next')) document.getElementById('pi-next').disabled = pag >= total;
}

function irAPagina(n) {
  if (n < 1 || n > _totalPaginas) return;
  const el = _pdfPageEls[n - 1];
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function renderPDF(url, container) {
  if (_pdfPageObserver) { _pdfPageObserver.disconnect(); _pdfPageObserver = null; }
  _pdfPageEls = [];
  _actualizarIndicador(0, 0);

  container.innerHTML =
    '<div style="padding:3rem;text-align:center;color:var(--subtext0);">Cargando PDF…</div>';
  try {
    const pdfDoc  = await pdfjsLib.getDocument({
      url,
      httpHeaders: { 'Authorization': `Bearer ${getToken()}` },
    }).promise;
    container.innerHTML = '';
    const total   = pdfDoc.numPages;
    const ancho   = container.clientWidth - 48;

    // Pre-calcula escala con la primera página para usar en placeholders
    const pag1    = await pdfDoc.getPage(1);
    const escala0 = Math.min(ancho / pag1.getViewport({ scale: 1 }).width, 2);
    const vp0     = pag1.getViewport({ scale: escala0 });

    // Cola de páginas pendientes de renderizar
    const cola = new Set();
    let renderizando = false;

    async function renderizarPagina(n) {
      const wrap = _pdfPageEls[n - 1];
      if (!wrap || wrap.dataset.rendered === '1') return;
      wrap.dataset.rendered = '1';

      const page     = await pdfDoc.getPage(n);
      const escala   = Math.min(ancho / page.getViewport({ scale: 1 }).width, 2);
      const viewport = page.getViewport({ scale: escala });

      wrap.style.width  = viewport.width  + 'px';
      wrap.style.height = viewport.height + 'px';
      wrap.style.background = '';
      wrap.innerHTML = '';

      const canvas = document.createElement('canvas');
      canvas.width  = viewport.width;
      canvas.height = viewport.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
      wrap.appendChild(canvas);

      // Text layer para selección y copia de texto
      const textLayerDiv = document.createElement('div');
      textLayerDiv.className    = 'textLayer';
      textLayerDiv.style.width  = viewport.width  + 'px';
      textLayerDiv.style.height = viewport.height + 'px';
      wrap.appendChild(textLayerDiv);
      const textContent = await page.getTextContent();
      pdfjsLib.renderTextLayer({
        textContentSource: textContent,
        container: textLayerDiv, viewport, textDivs: [],
      });
    }

    async function procesarCola() {
      if (renderizando) return;
      renderizando = true;
      while (cola.size > 0) {
        const n = cola.values().next().value;
        cola.delete(n);
        await renderizarPagina(n);
      }
      renderizando = false;
    }

    // IntersectionObserver: detecta páginas visibles y las pone en cola
    _pdfPageObserver = new IntersectionObserver((entries) => {
      let maxRatio = 0, paginaVis = _paginaActual;
      entries.forEach(e => {
        const n = parseInt(e.target.dataset.page);
        if (e.isIntersecting) {
          // Renderiza la página visible + 1 de buffer a cada lado
          [n - 1, n, n + 1].forEach(x => {
            if (x >= 1 && x <= total && _pdfPageEls[x-1]?.dataset.rendered !== '1')
              cola.add(x);
          });
          procesarCola();
        }
        if (e.intersectionRatio > maxRatio) {
          maxRatio = e.intersectionRatio; paginaVis = n;
        }
      });
      if (maxRatio > 0) _actualizarIndicador(paginaVis, total);
    }, { root: container, threshold: [0, 0.1, 0.5] });

    // Crea placeholders para todas las páginas (altura aproximada)
    for (let n = 1; n <= total; n++) {
      const wrap = document.createElement('div');
      wrap.className    = 'pdf-page-wrap';
      wrap.dataset.page = n;
      wrap.dataset.rendered = '0';
      wrap.style.cssText = `width:${vp0.width}px;height:${vp0.height}px;
        background:#141420;margin:0 auto 12px;border-radius:3px;
        display:flex;align-items:center;justify-content:center;color:var(--surface2);font-size:9pt;`;
      wrap.textContent = `Página ${n}`;
      container.appendChild(wrap);
      _pdfPageEls.push(wrap);
      _pdfPageObserver.observe(wrap);
    }

    // Renderiza las primeras 2 páginas de inmediato
    cola.add(1); if (total > 1) cola.add(2);
    procesarCola();
    _actualizarIndicador(1, total);

  } catch (e) {
    container.innerHTML =
      `<div style="padding:2rem;color:var(--red);text-align:center;">Error: ${escapeHtml(e.message)}</div>`;
  }
}

function resaltarEnHTML(html, term) {
  if (!term) return html;
  const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  // Solo reemplaza fuera de etiquetas HTML
  return html.replace(
    new RegExp(`(?![^<]*>)(${escaped})`, 'gi'),
    '<mark style="background:rgba(249,226,175,.4);color:#f9e2af;padding:0 2px;border-radius:2px;">$1</mark>'
  );
}

let _tcmt = null;
function debounceComentarios() {
  clearTimeout(_tcmt);
  _tcmt = setTimeout(cargarComentarios, 280);
}

async function cargarComentarios() {
  if (!estado.docActual) return;
  const cat    = document.getElementById('filter-cat').value;
  const prio   = document.getElementById('filter-prio').value;
  const status = document.getElementById('filter-status').value;
  const search = document.getElementById('filter-search').value;
  let url = `/comments/?document_id=${estado.docActual.id}`;
  if (cat)    url += `&category=${encodeURIComponent(cat)}`;
  if (prio)   url += `&priority=${encodeURIComponent(prio)}`;
  if (status) url += `&status=${encodeURIComponent(status)}`;
  if (search) url += `&search=${encodeURIComponent(search)}`;
  try {
    const lista = await api('GET', url);
    document.getElementById('comment-count').textContent = contarTodos(lista);
    renderComentarios(lista);
  } catch (e) { toast('Error: ' + e.message, 'error'); }
}

function contarTodos(lista) {
  return lista.reduce((a, c) => a + 1 + contarTodos(c.replies || []), 0);
}

function renderComentarios(lista) {
  const div = document.getElementById('comments-list');
  div.innerHTML = '';
  if (!lista.length) {
    div.innerHTML = `
      <div class="comments-empty">
        <i class='bx bx-comment-x'></i>
        <span>Sin comentarios aún</span>
      </div>`;
    return;
  }
  lista.forEach(c => div.appendChild(crearTarjetaComentario(c, false)));
}

function crearTarjetaComentario(c, esReply) {
  const prioCls = { Alta:'prio-alta', Media:'prio-media', Baja:'prio-baja' }[c.priority] || '';
  const sCls    = c.status.toLowerCase();
  const fecha   = (c.created_at || '').slice(0, 10);
  const catIconos = { General:'bx-comment', Importante:'bxs-star', Pregunta:'bx-help-circle',
    'Corrección':'bx-edit-alt', Referencia:'bx-link', Tarea:'bx-task' };
  const catIcon = catIconos[c.category] || 'bx-comment';

  const card = document.createElement('div');
  card.className = `comment-card ${prioCls}${esReply ? ' reply' : ''}`;

  card.innerHTML = `
    <div class="comment-meta">
      <span class="c-cat"><i class='bx ${catIcon}'></i> ${escapeHtml(c.category)}</span>
      <span class="c-prio ${c.priority.toLowerCase()}">${c.priority}</span>
      ${c.author ? `<span class="c-author"><i class='bx bx-user'></i> ${escapeHtml(c.author)}</span>` : ''}
      <span class="c-status ${sCls}">${c.status}</span>
      <span class="c-date">${fecha}</span>
    </div>
    ${c.location_info ? `<div class="c-location"><i class='bx bx-map-pin'></i>${escapeHtml(c.location_info)}</div>` : ''}
    ${c.highlighted_text ? `<div class="c-highlighted">"${escapeHtml(c.highlighted_text)}"</div>` : ''}
    <div class="c-content">${escapeHtml(c.content)}</div>
    <div class="comment-actions">
      <button class="btn btn-ghost btn-sm" onclick="responder(${c.id}, '${escapeHtml(c.author||'comentario')}')">
        <i class='bx bx-reply'></i> Responder
      </button>
      <button class="btn btn-ghost btn-sm" onclick="ciclarEstadoComentario(${c.id}, '${c.status}')">
        <i class='bx bx-transfer-alt'></i> ${c.status}
      </button>
      <button class="btn-icon btn-sm" onclick="eliminarComentario(${c.id})" title="Eliminar">
        <i class='bx bx-trash'></i>
      </button>
    </div>
  `;
  if (c.replies?.length) {
    c.replies.forEach(r => card.appendChild(crearTarjetaComentario(r, true)));
  }
  return card;
}

async function descargarArchivo(docId, nombre) {
  try {
    const res = await fetch(`/api/documents/${docId}/file?descarga=true`, {
      headers: { 'Authorization': `Bearer ${getToken()}` },
    });
    if (!res.ok) throw new Error('Error al descargar');
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = nombre; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch (e) { toast('Error al descargar: ' + e.message, 'error'); }
}

async function exportarComentarios(tipo) {
  if (!estado.docActual) { toast('Abre un documento primero', 'error'); return; }
  try {
    const res = await fetch(`/api/export/${tipo}?doc_id=${estado.docActual.id}`, {
      headers: { 'Authorization': `Bearer ${getToken()}` },
    });
    if (!res.ok) throw new Error('Error al exportar');
    const blob = await res.blob();
    const cd   = res.headers.get('Content-Disposition') || '';
    const nombre = cd.match(/filename="?([^"]+)"?/)?.[1] || `comentarios.${tipo}`;
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = nombre; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch (e) { toast('Error al exportar: ' + e.message, 'error'); }
}

let _tsrch = null;
document.getElementById('search-global').addEventListener('input', e => {

});

async function ejecutarBusqueda(q) {
  try {
    const res = await api('GET', `/search/?q=${encodeURIComponent(q)}`);
    renderBusqueda(res, q);
  } catch { cerrarBusqueda(); }
}

function renderBusqueda(resultados, q) {
  const div = document.getElementById('search-results');
  div.classList.add('visible');
  if (!resultados.length) {
    div.innerHTML = `<div class="sr-empty">Sin resultados para "${escapeHtml(q)}"</div>`;
    return;
  }
  const fmtIconos = { pdf:'bxs-file-pdf', docx:'bxs-file-doc', doc:'bxs-file-doc',
    md:'bx-code-alt', markdown:'bx-code-alt', txt:'bx-file-blank' };
  const fmtColores = { pdf:'var(--red)', docx:'var(--blue)', doc:'var(--blue)',
    md:'var(--green)', txt:'var(--subtext0)' };
  div.innerHTML = resultados.slice(0, 10).map(r => {
    const fmt = r.format?.toLowerCase() || 'txt';
    return `
      <div class="sr-item" onclick="abrirDesdeBusqueda(${r.id}, '${escapeHtml(q)}')">
        <i class='bx ${fmtIconos[fmt]||'bx-file-blank'} sr-fmt-icon'
           style="color:${fmtColores[fmt]||'var(--subtext0)'};"></i>
        <div class="sr-info">
          <div class="sr-name">${escapeHtml(r.name)}</div>
          ${r.snippet ? `<div class="sr-snippet">${r.snippet}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function cerrarBusqueda() {
  document.getElementById('search-results').classList.remove('visible');
}

async function abrirDesdeBusqueda(docId, termino) {
  cerrarBusqueda();
  document.getElementById('search-global').value = '';
  estado.terminoBusqueda = termino;
  await abrirDocumento(docId, termino);
}

// ─── Drag & Drop para subir archivos ─────────────────────────────────────────
let _dragCount = 0;
const EXTS_VALIDOS = new Set(['pdf','docx','doc','md','txt','markdown']);

document.addEventListener('dragenter', e => {
  if (!e.dataTransfer.types.includes('Files')) return;
  _dragCount++;
  document.getElementById('drop-overlay').classList.add('visible');
});
document.addEventListener('dragleave', () => {
  _dragCount--;
  if (_dragCount <= 0) {
    _dragCount = 0;
    document.getElementById('drop-overlay').classList.remove('visible');
  }
});
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  _dragCount = 0;
  document.getElementById('drop-overlay').classList.remove('visible');
  const archivos = [...e.dataTransfer.files].filter(f => {
    const ext = f.name.split('.').pop().toLowerCase();
    return EXTS_VALIDOS.has(ext);
  });
  if (archivos.length) abrirModalSubirConArchivos(archivos);
  else toast('Formato no soportado. Usa PDF, DOCX, MD o TXT.', 'error');
});

async function subirDocumento() {
  const fi = document.getElementById('m-file');
  if (!fi.files.length) { toast('Selecciona un archivo', 'error'); return; }
  const fd = new FormData();
  fd.append('file', fi.files[0]);
  const fid = document.getElementById('m-folder-dest').value;
  if (fid) fd.append('folder_id', fid);
  fd.append('status',    document.getElementById('m-status').value);
  fd.append('tags',      document.getElementById('m-tags').value);
  fd.append('biblioteca', document.getElementById('m-biblioteca')?.value || 'general');
  const meta = leerMetadatosModal();
  Object.entries(meta).forEach(([k, v]) => fd.append(k, v));
  try {
    const doc = await api('POST', '/documents/', fd, true);
    toast('Documento subido: ' + doc.name, 'ok');
    cerrarModal();
    await cargarArbol();
    await cargarStats();
    await abrirDocumento(doc.id);
  } catch (e) { toast(e.message, 'error'); }
}

    api('GET', '/folders/'),
    api('GET', `/documents/${estado.docActual.id}/folders`).catch(() => []),
  ]);
  const idsActuales = new Set(actuales.map(c => c.id));

  const overlay = crearOverlay();
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-head">
        <i class='bx bx-transfer'></i>
        <h3>Mover a Carpeta</h3>
      </div>
      <p style="font-size:8.5pt;color:var(--subtext0);">
        Selecciona la carpeta destino. El documento se quitará de las carpetas actuales.
      </p>

        <label>Carpeta destino</label>
        <div class="modal-folder-tree" id="modal-folder-list">
          <div class="modal-folder-item ${idsActuales.size===0?'selected':''}" data-folder-id="" onclick="selFolderMover(this)">
            <i class='bx bx-folder-open' style="color:var(--subtext0);"></i>
            <span>Sin carpeta</span>
          </div>
          ${carpetas.map(c => `
            <div class="modal-folder-item ${idsActuales.has(c.id)?'selected':''}"
                 data-folder-id="${c.id}" onclick="selFolderMover(this)">
              <i class='bx bxs-folder' style="color:${c.color||'var(--blue)'};"></i>
              <span>${escapeHtml(c.name)}</span>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="cerrarModal()"><i class='bx bx-x'></i> Cancelar</button>
        <button class="btn btn-primary" onclick="ejecutarMoverDoc(${JSON.stringify([...idsActuales])})">
          <i class='bx bx-check'></i> Mover
        </button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function selFolderMover(el) {
  document.querySelectorAll('.modal-folder-item').forEach(i => i.classList.remove('selected'));
  el.classList.add('selected');
}

async function ejecutarMoverDoc(idsActuales) {
  const sel = document.querySelector('.modal-folder-item.selected');
  if (!sel) { toast('Selecciona una carpeta', 'error'); return; }
  const nuevoFolderId = sel.dataset.folderId ? Number(sel.dataset.folderId) : null;
  const docId = estado.docActual.id;
  try {
    // Quitar de carpetas actuales
    for (const oldId of idsActuales) {
      await api('DELETE', `/folders/${oldId}/documents/${docId}`);
    }
    // Asignar a nueva carpeta
    if (nuevoFolderId) {
      await api('POST', `/folders/${nuevoFolderId}/documents/${docId}`);
    }
    toast('Documento movido', 'ok');
    cerrarModal();
    await cargarArbol();
    await renderVisorHeader(estado.docActual);
  } catch (e) { toast(e.message, 'error'); }
}

async function guardarEdicionDoc() {

  const tags = document.getElementById('m-doc-tags').value.trim();
  if (!name) { toast('El nombre no puede estar vacío', 'error'); return; }
  try {

    document.getElementById('viewer-title').textContent = doc.name;
    toast('Documento actualizado', 'ok');
    cerrarModal();
    await cargarArbol();
  } catch (e) { toast(e.message, 'error'); }
}

async function eliminarDoc() {
  if (!estado.docActual || !confirm(`¿Eliminar "${estado.docActual.name}"?`)) return;
  try {
    await api('DELETE', `/documents/${estado.docActual.id}`);
    estado.docActual = null;
    estado.terminoBusqueda = '';
    document.getElementById('viewer-header').classList.add('hidden');
    document.getElementById('pdf-container').style.display = 'none';
    document.getElementById('html-content').style.display = 'none';

// ─── Atajos de teclado ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if ((e.ctrlKey || e.metaKey) && e.key === 'u') { e.preventDefault(); abrirModalSubir(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') { e.preventDefault(); document.getElementById('search-global').focus(); }
  if (e.key === 'Escape') { cerrarModal(); cerrarBusqueda(); }
});

// ─── Toggle paneles laterales ────────────────────────────────────────────────
function togglePanel(panelId) {
  const panel = document.getElementById(panelId);
  const btn   = document.getElementById(`btn-toggle-${panelId === 'sidebar' ? 'sidebar' : 'comments'}`);
  const esColapsado = panel.classList.toggle('collapsed');
  btn?.classList.toggle('panel-hidden', esColapsado);
  // Ocultar/mostrar resizer adyacente
  const resizerId = panelId === 'sidebar' ? 'resizer-left' : 'resizer-right';
  const resizer   = document.getElementById(resizerId);
  if (resizer) resizer.style.display = esColapsado ? 'none' : '';
}

// ─── Pantalla completa ───────────────────────────────────────────────────────
function toggleFullscreen() {
  const viewer = document.getElementById('viewer-panel');
  const activo = viewer.classList.toggle('fullscreen');
  // Atajos de teclado: Escape para salir
  if (activo) {
    document.addEventListener('keydown', _escapeFullscreen);
  } else {
    document.removeEventListener('keydown', _escapeFullscreen);
  }
}
function _escapeFullscreen(e) {
  if (e.key === 'Escape') toggleFullscreen();
}

// ─── Resizers ────────────────────────────────────────────────────────────────
function initResizer(id, panelId, lado) {
  const resizer = document.getElementById(id);
  const panel   = document.getElementById(panelId);
  let sx, sw;
  resizer.addEventListener('mousedown', e => {
    sx = e.clientX; sw = panel.getBoundingClientRect().width;
    resizer.classList.add('dragging');
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'col-resize';
  });
  document.addEventListener('mousemove', e => {
    if (!resizer.classList.contains('dragging')) return;
    const delta = lado === 'left' ? e.clientX - sx : sx - e.clientX;
    panel.style.width = Math.max(160, Math.min(500, sw + delta)) + 'px';
  });
  document.addEventListener('mouseup', () => {
    resizer.classList.remove('dragging');
    document.body.style.userSelect = '';
    document.body.style.cursor = '';
  });
}

// ─── Utilidades ──────────────────────────────────────────────────────────────
function crearOverlay() {
  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.onclick = e => { if (e.target === ov) cerrarModal(); };
  return ov;
}
function cerrarModal() {
  document.querySelectorAll('.modal-overlay').forEach(el => el.remove());
}
function escapeHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function filaMetadato(icon, label, valor) {
  return `
    <div class="meta-row">

      <span class="meta-valor">${escapeHtml(valor)}</span>
    </div>`;
}

function iconVigencia(ve) {
  return { Vigente:'bx-check-circle', Derogado:'bx-x-circle', Modificado:'bx-edit-alt',
           Suspendido:'bx-pause-circle', Compilado:'bx-book-bookmark',
           'Por confirmar':'bx-question-mark' }[ve] || 'bx-question-mark';
}

function renderListaRelaciones(relaciones, docId) {
  const grupos = {};
  for (const r of relaciones) {
    const esOrigen  = r.doc_origen_id  === docId;
    const tipoLabel = esOrigen
      ? r.tipo_relacion
      : `Es ${r.tipo_relacion.toLowerCase()} por`;
    if (!grupos[tipoLabel]) grupos[tipoLabel] = [];
    grupos[tipoLabel].push({ ...r, esOrigen });
  }

  return Object.entries(grupos).map(([tipo, items]) => `
    <div style="margin-bottom:8px;">
      <div style="font-size:7.5pt;font-weight:700;color:var(--subtext0);
                  text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;">
        ${escapeHtml(tipo)}
      </div>
      ${items.map(r => {
        const otro = r.esOrigen
          ? { id: r.doc_destino_id, nombre: r.doc_destino_nombre,
              tipo: r.doc_destino_tipo, numero: r.doc_destino_numero }
          : { id: r.doc_origen_id,  nombre: r.doc_origen_nombre,
              tipo: r.doc_origen_tipo,  numero: r.doc_origen_numero };
        return `
          <div class="relacion-item">
            <div class="rel-icon-wrap">
              <i class='bx bx-file-blank'></i>
            </div>
            <div class="rel-info" onclick="abrirDocumento(${otro.id})">
              <div class="rel-nombre">${escapeHtml(otro.nombre || 'Documento')}</div>
              <div class="rel-tipo-norma">${escapeHtml([otro.tipo, otro.numero].filter(Boolean).join(' '))}</div>
              ${r.descripcion ? `<div class="rel-desc">${escapeHtml(r.descripcion)}</div>` : ''}
            </div>
            <button class="btn-icon btn-sm" title="Eliminar relación"
                    onclick="eliminarRelacion(${r.id})" style="color:var(--red);">
              <i class='bx bx-trash'></i>
            </button>
          </div>`;
      }).join('')}
    </div>`).join('');
}

      <div class="modal-field">
        <label>Documento relacionado</label>
        <select id="m-rel-destino" style="font-size:8.5pt;">
          <option value="">— Selecciona —</option>
          ${otros.map(d => `
            <option value="${d.id}">
              ${escapeHtml([d.tipo_norma, d.numero_norma, d.name].filter(Boolean).join(' · '))}
            </option>`).join('')}
        </select>
      </div>
      <div class="modal-field">
        <label>Descripción (opcional)</label>
        <input id="m-rel-desc" placeholder="ej. Modifica el artículo 5 sobre tarifas…">
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="cerrarModal()"><i class='bx bx-x'></i> Cancelar</button>
        <button class="btn btn-primary" onclick="guardarRelacion()"><i class='bx bx-check'></i> Guardar</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

async function guardarRelacion() {
  const tipo    = document.getElementById('m-rel-tipo').value;
  const destino = Number(document.getElementById('m-rel-destino').value);
  const desc    = document.getElementById('m-rel-desc').value.trim();
  if (!destino) { toast('Selecciona el documento relacionado', 'error'); return; }
  try {
    await api('POST', '/relations/', {
      doc_origen_id:  estado.docActual.id,
      doc_destino_id: destino,
      tipo_relacion:  tipo,
      descripcion:    desc,
    });
    toast('Relación guardada', 'ok');
    cerrarModal();
    renderNormaPanel(estado.docActual);
  } catch (e) { toast(e.message, 'error'); }
}

async function eliminarRelacion(relId) {
  if (!confirm('¿Eliminar esta relación?')) return;
  try {
    await api('DELETE', `/relations/${relId}`);
    toast('Relación eliminada', 'ok');
    renderNormaPanel(estado.docActual);
  } catch (e) { toast(e.message, 'error'); }
}

// ─── Biblioteca dual ─────────────────────────────────────────────────────────
function cambiarBiblioteca(modo) {
  estado.biblioteca = modo;
  document.querySelectorAll('.biblioteca-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${modo}`)?.classList.add('active');
  // Lectors no ven la pestaña personal
  const user = estado.usuarioActual;
  if (user?.role === 'lector') {
    document.getElementById('tab-personal').style.display = 'none';
  }
  cargarArbol();
}

// ─── Menú de usuario ─────────────────────────────────────────────────────────
function abrirMenuUsuario() {
  const user = estado.usuarioActual;
  if (!user) return;
  const overlay = crearOverlay();
  overlay.innerHTML = `
    <div class="modal" style="max-width:320px;">
      <div class="modal-head">
        <div class="user-avatar" style="width:32px;height:32px;font-size:12pt;">
          ${escapeHtml((user.nombre || user.username)[0].toUpperCase())}
        </div>
        <div>
          <div style="font-size:10pt;font-weight:700;">${escapeHtml(user.nombre || user.username)}</div>
          <div style="font-size:8pt;color:var(--subtext0);">@${escapeHtml(user.username)}</div>
        </div>
        <span class="role-badge role-${user.role}" style="margin-left:auto;">${user.role}</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <button class="btn btn-ghost" style="justify-content:flex-start;" onclick="cerrarModal();abrirModalCambiarPassword()">
          <i class='bx bx-lock-alt'></i> Cambiar contraseña
        </button>
        ${user.role === 'admin' ? `
        <button class="btn btn-ghost" style="justify-content:flex-start;" onclick="cerrarModal();abrirGestionUsuarios()">
          <i class='bx bx-group'></i> Gestionar usuarios
        </button>` : ''}
        <hr style="border-color:var(--surface1);margin:4px 0;">
        <button class="btn btn-danger" style="justify-content:flex-start;" onclick="cerrarModal();cerrarSesion()">
          <i class='bx bx-log-out'></i> Cerrar sesión
        </button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function renderizarChipUsuario(user) {
  const inicial = (user.nombre || user.username)[0].toUpperCase();
  document.getElementById('user-avatar').textContent   = inicial;
  document.getElementById('user-nombre').textContent   = user.nombre || user.username;
  const badge = document.getElementById('user-role-badge');
  badge.textContent  = user.role;
  badge.className    = `role-badge role-${user.role}`;
  // Lectors no pueden subir ni crear carpetas
  if (user.role === 'lector') {
    document.getElementById('btn-subir')?.setAttribute('disabled', 'disabled');
    document.getElementById('btn-nueva-carpeta')?.setAttribute('disabled', 'disabled');
  }
}

// ─── Cambiar contraseña ───────────────────────────────────────────────────────
function abrirModalCambiarPassword() {
  const overlay = crearOverlay();
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-head"><i class='bx bx-lock-alt'></i><h3>Cambiar contraseña</h3></div>
      <div class="modal-field">
        <label>Contraseña actual</label>
        <input type="password" id="m-pass-actual" placeholder="••••••">
      </div>
      <div class="modal-field">
        <label>Nueva contraseña</label>
        <input type="password" id="m-pass-nueva" placeholder="Mínimo 6 caracteres">
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="cerrarModal()"><i class='bx bx-x'></i> Cancelar</button>
        <button class="btn btn-primary" onclick="guardarNuevaPassword()"><i class='bx bx-check'></i> Guardar</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

async function guardarNuevaPassword() {
  const actual = document.getElementById('m-pass-actual').value;
  const nueva  = document.getElementById('m-pass-nueva').value;
  if (nueva.length < 6) { toast('Mínimo 6 caracteres', 'error'); return; }
  try {
    await api('POST', '/auth/cambiar-password', { password_actual: actual, password_nueva: nueva });
    toast('Contraseña actualizada', 'ok');
    cerrarModal();
  } catch (e) { toast(e.message, 'error'); }
}

// ─── Gestión de usuarios (Admin) ──────────────────────────────────────────────
async function abrirGestionUsuarios() {
  const usuarios = await api('GET', '/users/').catch(() => []);
  const overlay  = crearOverlay();
  overlay.innerHTML = `
    <div class="modal" style="max-width:600px;width:95%;">
      <div class="modal-head">
        <i class='bx bx-group'></i><h3>Gestión de usuarios</h3>
        <button class="btn btn-primary btn-sm" style="margin-left:auto;" onclick="abrirModalNuevoUsuario()">
          <i class='bx bx-plus'></i> Nuevo usuario
        </button>
      </div>
      <div style="overflow-x:auto;">
        <table class="users-table">
          <thead><tr>
            <th>Usuario</th><th>Nombre</th><th>Rol</th><th>Estado</th><th>Acciones</th>
          </tr></thead>
          <tbody>
            ${usuarios.map(u => `
              <tr>
                <td><code style="font-size:8pt;">@${escapeHtml(u.username)}</code></td>
                <td>${escapeHtml(u.nombre || '—')}</td>
                <td><span class="role-badge role-${u.role}">${u.role}</span></td>
                <td>${u.activo ? '<span style="color:var(--green);">●</span> Activo' : '<span style="color:var(--red);">●</span> Inactivo'}</td>
                <td style="display:flex;gap:4px;">
                  <button class="btn-icon btn-sm" onclick="abrirModalEditarUsuario(${u.id})" title="Editar"><i class='bx bx-edit'></i></button>
                  <button class="btn-icon btn-sm" style="color:var(--red);" onclick="eliminarUsuario(${u.id},'${escapeHtml(u.username)}')" title="Eliminar"><i class='bx bx-trash'></i></button>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="cerrarModal()"><i class='bx bx-x'></i> Cerrar</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function abrirModalNuevoUsuario() {
  cerrarModal();
  const overlay = crearOverlay();
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-head"><i class='bx bx-user-plus'></i><h3>Nuevo usuario</h3></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div class="modal-field"><label>Usuario</label><input id="m-u-user" placeholder="sin espacios"></div>
        <div class="modal-field"><label>Nombre completo</label><input id="m-u-nombre" placeholder="Nombre"></div>
      </div>
      <div class="modal-field"><label>Email (opcional)</label><input id="m-u-email" type="email" placeholder="correo@ejemplo.com"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div class="modal-field">
          <label>Rol</label>
          <select id="m-u-role">
            <option value="lector">Lector</option>
            <option value="editor">Editor</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="modal-field"><label>Contraseña</label><input type="password" id="m-u-pass" placeholder="Mínimo 6 chars"></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="cerrarModal();abrirGestionUsuarios()"><i class='bx bx-x'></i> Cancelar</button>
        <button class="btn btn-primary" onclick="crearUsuario()"><i class='bx bx-check'></i> Crear</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

async function crearUsuario() {
  const username = document.getElementById('m-u-user').value.trim();
  const nombre   = document.getElementById('m-u-nombre').value.trim();
  const email    = document.getElementById('m-u-email').value.trim();
  const role     = document.getElementById('m-u-role').value;
  const password = document.getElementById('m-u-pass').value;
  if (!username || !password) { toast('Usuario y contraseña son requeridos', 'error'); return; }
  try {
    await api('POST', '/users/', { username, nombre, email, role, password });
    toast(`Usuario @${username} creado`, 'ok');
    cerrarModal();
    abrirGestionUsuarios();
  } catch (e) { toast(e.message, 'error'); }
}

async function abrirModalEditarUsuario(userId) {
  const usuarios = await api('GET', '/users/').catch(() => []);
  const u = usuarios.find(x => x.id === userId);
  if (!u) return;
  cerrarModal();
  const overlay = crearOverlay();
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-head"><i class='bx bx-edit'></i><h3>Editar @${escapeHtml(u.username)}</h3></div>
      <div class="modal-field"><label>Nombre completo</label><input id="m-eu-nombre" value="${escapeHtml(u.nombre||'')}"></div>
      <div class="modal-field"><label>Email</label><input type="email" id="m-eu-email" value="${escapeHtml(u.email||'')}"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div class="modal-field">
          <label>Rol</label>
          <select id="m-eu-role">
            ${['lector','editor','admin'].map(r => `<option value="${r}" ${r===u.role?'selected':''}>${r}</option>`).join('')}
          </select>
        </div>
        <div class="modal-field">
          <label>Estado</label>
          <select id="m-eu-activo">
            <option value="1" ${u.activo?'selected':''}>Activo</option>
            <option value="0" ${!u.activo?'selected':''}>Inactivo</option>
          </select>
        </div>
      </div>
      <div class="modal-field"><label>Nueva contraseña (dejar vacío = no cambiar)</label><input type="password" id="m-eu-pass" placeholder="••••••"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="cerrarModal();abrirGestionUsuarios()"><i class='bx bx-x'></i> Cancelar</button>
        <button class="btn btn-primary" onclick="guardarEdicionUsuario(${userId})"><i class='bx bx-check'></i> Guardar</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

async function guardarEdicionUsuario(userId) {
  const cambios = {
    nombre: document.getElementById('m-eu-nombre').value.trim(),
    email:  document.getElementById('m-eu-email').value.trim(),
    role:   document.getElementById('m-eu-role').value,
    activo: Number(document.getElementById('m-eu-activo').value),
  };
  const newPass = document.getElementById('m-eu-pass').value;
  if (newPass) cambios.password = newPass;
  try {
    await api('PUT', `/users/${userId}`, cambios);
    toast('Usuario actualizado', 'ok');
    cerrarModal();
    abrirGestionUsuarios();
  } catch (e) { toast(e.message, 'error'); }
}

async function eliminarUsuario(userId, username) {
  if (!confirm(`¿Eliminar al usuario @${username}?`)) return;
  try {
    await api('DELETE', `/users/${userId}`);
    toast(`Usuario @${username} eliminado`, 'ok');
    cerrarModal();
    abrirGestionUsuarios();
  } catch (e) { toast(e.message, 'error'); }
}

// ─── Iniciar app ──────────────────────────────────────────────────────────────
async function iniciarApp() {
  const user = getUsuario();
  if (!user) { mostrarLogin(); return; }
  limpiarEstadoApp();
  estado.usuarioActual = user;
  renderizarChipUsuario(user);
  // Ocultar pestaña Personal para Lectors
  if (user.role === 'lector') {
    document.getElementById('tab-personal').style.display = 'none';
  }
  await cargarConstantes();
  await cargarArbol();
  await cargarStats();
}

// (cargarArbol ya pasa biblioteca via estado.biblioteca en el API call)

initResizer('resizer-left',  'sidebar',        'left');

// Verificar sesión al cargar
(async () => {
  const token = getToken();
  if (token) {
    try {
      const res = await fetch('/api/auth/me', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) {
        const user = await res.json();
        guardarSesion(token, user);
        ocultarLogin();
        await iniciarApp();
        return;
      }
    } catch { /* token inválido */ }
  }
  mostrarLogin();
})();
</script>
